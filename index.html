    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body {
        background: #FFFFFF;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      [contenteditable], input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }
      #loading {
        position: fixed; inset: 0; background: #FFFFFF;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 16px; z-index: 9999; transition: opacity 0.4s ease;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      .loading-text { font-family: Georgia,serif; font-size: 22px; font-weight: 700; color: #7A2B35; }
      .loading-sub { font-family: monospace; font-size: 9px; color: #B6B6B6; text-transform: uppercase; letter-spacing: 0.1em; }
      .loading-bar { width: 120px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; overflow: hidden; }
      .loading-bar-fill { height: 100%; background: linear-gradient(90deg,#6B7ED9,#B06BD9); animation: loadBar 1.2s ease-in-out infinite; }
      @keyframes loadBar { 0%{width:0%;margin-left:0%} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
      .ground-glow{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:160px;height:20px;border-radius:50%;background:radial-gradient(ellipse,#FFB80055 0%,transparent 70%);z-index:1;animation:glowPulse 2.4s ease-in-out infinite;}
      @keyframes glowPulse{0%,100%{opacity:0.5;transform:translateX(-50%) scaleX(1)}50%{opacity:1;transform:translateX(-50%) scaleX(1.6)}}
      @keyframes boltIdle{0%,100%{filter:drop-shadow(0 0 8px #FFB800) drop-shadow(0 0 18px #FFB80088) drop-shadow(0 0 36px #FFB80033);}50%{filter:drop-shadow(0 0 18px #fff) drop-shadow(0 0 40px #FFB800) drop-shadow(0 0 80px #FFB80066) drop-shadow(0 0 100px #00E5FF33);}}
      @keyframes boltCharge{0%{filter:drop-shadow(0 0 24px #fff) drop-shadow(0 0 50px #FFB800);opacity:1;transform:scale(1.05)}25%{filter:drop-shadow(0 0 5px #FFB800);opacity:0.4;transform:scale(0.98)}55%{filter:drop-shadow(0 0 30px #fff) drop-shadow(0 0 60px #FFB800);opacity:1;transform:scale(1.08)}80%{filter:drop-shadow(0 0 5px #FFB800);opacity:0.5;transform:scale(0.97)}100%{filter:drop-shadow(0 0 24px #fff) drop-shadow(0 0 50px #FFB800);opacity:1;transform:scale(1.05)}}
      .bolt-idle{animation:boltIdle 2.4s ease-in-out infinite;}
      .bolt-charge{animation:boltCharge 0.12s steps(2,end) infinite;}
      .mpaper-letter{font-family:'Plus Jakarta Sans',sans-serif;font-size:80px;font-weight:900;color:#7A2B35;line-height:1;display:inline-block;letter-spacing:-2px;}
      .mpaper-letter.space{width:22px;display:inline-block;}
      .mpaper-letter.struck{color:#FFD700!important;filter:drop-shadow(0 0 8px #FFD700) drop-shadow(0 0 20px #E8B820) drop-shadow(0 0 4px #fff)!important;}
      @keyframes letterShake{0%{transform:translate(0,0)}15%{transform:translate(-3px,-2px)}30%{transform:translate(3px,2px)}45%{transform:translate(-2px,3px)}60%{transform:translate(3px,-2px)}75%{transform:translate(-3px,2px)}90%{transform:translate(2px,-2px)}100%{transform:translate(0,0)}}
      .mpaper-letter.shaking{animation:letterShake 0.07s linear infinite;}

      function boltOrigin(){var r=boltImg.getBoundingClientRect();return{x:r.left+r.width*0.5,y:r.top+r.height*0.5};}
      function letterCenter(id){var el=document.getElementById(id);if(!el||el.classList.contains('space'))return null;var r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
      function buildSegs(x0,y0,x1,y1){var out=[];(function sub(ax,ay,bx,by,d){if(d===0){out.push([ax,ay,bx,by]);return;}var mx=(ax+bx)/2+(Math.random()-0.5)*d*22,my=(ay+by)/2+(Math.random()-0.5)*d*22;sub(ax,ay,mx,my,d-1);sub(mx,my,bx,by,d-1);if(d===2&&Math.random()<0.55){var ang=Math.atan2(by-ay,bx-ax)+(Math.random()-0.5)*1.6,len=Math.hypot(bx-ax,by-ay)*(0.25+Math.random()*0.4);sub(mx,my,mx+Math.cos(ang)*len,my+Math.sin(ang)*len,d-2);}})(x0,y0,x1,y1,4);return out;}
      function drawArc(x0,y0,x1,y1){var s=buildSegs(x0,y0,x1,y1);[[26,'#00E5FF',60,0.06],[7,'#FFB800',22,0.55],[3,'#FFF5CC',9,0.85],[1,'#FFFFFF',3,1.0]].forEach(function(p){ctx.save();ctx.globalAlpha=p[3];ctx.strokeStyle=p[1];ctx.lineWidth=p[0];ctx.shadowColor=p[1];ctx.shadowBlur=p[2];ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();s.forEach(function(seg,i){if(i===0)ctx.moveTo(seg[0],seg[1]);ctx.lineTo(seg[2],seg[3]);});ctx.stroke();ctx.restore();});}
      function sparks(cx,cy,n){for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,l=5+Math.random()*32,col=Math.random()<0.5?'#FFB800':Math.random()<0.5?'#00E5FF':'#FFD700';ctx.save();ctx.strokeStyle=col;ctx.lineWidth=0.7+Math.random()*2;ctx.globalAlpha=0.5+Math.random()*0.5;ctx.shadowColor=col;ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*l,cy+Math.sin(a)*l);ctx.stroke();ctx.restore();}}
      function flash(id){var el=document.getElementById(id);if(el){el.classList.add('struck','shaking');}}
      function unflash(id){var el=document.getElementById(id);if(el){el.classList.remove('struck','shaking');}}
      var LETTERS=['ltr-M','ltr-P','ltr-a','ltr-p','ltr-e','ltr-r'],lastHit=null,sparkTick=null;
      function pick(){var pool=LETTERS.filter(function(id){return id!==lastHit;});return pool[Math.floor(Math.random()*pool.length)];}
      function doStrike(){
        boltImg.classList.remove('bolt-idle');boltImg.classList.add('bolt-charge');
        setTimeout(function(){
          boltImg.classList.remove('bolt-charge');boltImg.classList.add('bolt-idle');
          var tid=pick();lastHit=tid;
          var src=boltOrigin(),dst=letterCenter(tid);
          if(!src||!dst){schedule();return;}
          flash(tid);sparks(dst.x,dst.y,26);sparks(src.x,src.y,12);
          sparkTick=setInterval(function(){sparks(dst.x,dst.y,7);},80);
          var end=Date.now()+950;
          (function frame(){ctx.clearRect(0,0,canvas.width,canvas.height);drawArc(src.x,src.y,dst.x,dst.y);if(Date.now()<end)requestAnimationFrame(frame);else{clearInterval(sparkTick);ctx.clearRect(0,0,canvas.width,canvas.height);unflash(tid);schedule();}})();
        },360);
      }
      function schedule(){setTimeout(doStrike,500+Math.random()*900);}
      setTimeout(schedule,700);
    })();
    </script>
  </body>
</html>
