<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Notable</title>
    <meta name="description" content="Notable — Your second brain." />
    <link rel="manifest" href="/notable-pwa/manifest.json" />
    <meta name="theme-color" content="#18182A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Notable" />
    <link rel="apple-touch-icon" href="/notable-pwa/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/notable-pwa/icons/icon-96.png" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body {
        background: #18182A;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      [contenteditable], input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }
      #loading {
        position: fixed; inset: 0; background: #18182A;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 16px; z-index: 9999; transition: opacity 0.4s ease;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      .loading-text { font-family: Georgia,serif; font-size: 22px; font-weight: 700; color: #ECEAF5; }
      .loading-sub { font-family: monospace; font-size: 11px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; }
      .loading-bar { width: 120px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; overflow: hidden; }
      .loading-bar-fill { height: 100%; background: linear-gradient(90deg,#6B7ED9,#B06BD9); animation: loadBar 1.2s ease-in-out infinite; }
      @keyframes loadBar { 0%{width:0%;margin-left:0%} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
    </style>
    <script type="module" crossorigin src="/notable-pwa/assets/index-DQzEusBT.js"></script>
  </head>
  <body>
    <div id="loading">
      <div style="font-size:48px">📝</div>
      <div class="loading-text">Notable</div>
      <div class="loading-sub">Your Second Brain</div>
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script>
      window.__hideLoading = function() {
        const el = document.getElementById('loading');
        if (el) { el.classList.add('hidden'); setTimeout(() => el.remove(), 400); }
      };
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker
            .register('/notable-pwa/sw.js')
            .then(r => console.log('[Notable] SW registered:', r.scope))
            .catch(e => console.warn('[Notable] SW failed:', e));
        });
      }
    </script>
  </body>
</html>
